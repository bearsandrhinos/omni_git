name: Generate Semantic Views

on:
  # Trigger only when a PR is merged (closed and merged)
  pull_request:
    types: [closed]
    paths:
      - 'omni/**/*.topic.yaml'
      - 'omni/**/*.view.yaml'
      - 'omni/**/relationships.yaml'
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      topic:
        description: 'Specific topic to generate (leave empty for all topics)'
        required: false
        type: string

env:
  PYTHON_VERSION: '3.11'
  TERRAFORM_VERSION: '1.6.0'

jobs:
  generate-semantic-views:
    runs-on: ubuntu-latest
    environment: production  # Use environment secrets for better security
    permissions:
      contents: write
      pull-requests: write
    # Only run if PR was actually merged (not just closed)
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for better diff detection
          # For PR events, checkout both base and head to compare
          # For merged PRs, checkout the base branch (main) which has the merged code
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.merged == true && format('refs/heads/{0}', github.event.pull_request.base.ref) || (github.event_name == 'pull_request' && github.head_ref || github.ref) }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure Snowflake credentials
        run: |
          # Create terraform.tfvars from GitHub environment secrets
          # These come from the 'production' environment configured in the job
          # Provider v2.0+ requires both organization_name and account_name
          cat > terraform/terraform.tfvars << EOF
          snowflake_organization_name = "${{ secrets.SNOWFLAKE_ORGANIZATION_NAME }}"
          snowflake_account_name = "${{ secrets.SNOWFLAKE_ACCOUNT_NAME }}"
          snowflake_user = "${{ secrets.SNOWFLAKE_USER }}"
          snowflake_oauth_access_token = "${{ secrets.SNOWFLAKE_OAUTH_ACCESS_TOKEN }}"
          snowflake_warehouse = "${{ secrets.SNOWFLAKE_WAREHOUSE }}"
          snowflake_database = "${{ secrets.SNOWFLAKE_DATABASE }}"
          snowflake_role = "${{ secrets.SNOWFLAKE_ROLE }}"
          EOF
          
          echo "Configured Snowflake organization: ${{ secrets.SNOWFLAKE_ORGANIZATION_NAME }}"
          echo "Configured Snowflake account: ${{ secrets.SNOWFLAKE_ACCOUNT_NAME }}"
          echo ""
          echo "⚠️  If you see 404 authentication errors, check:"
          echo "   1. Network policies allow GitHub Actions IPs"
          echo "   2. PAT token is valid and not expired"
          echo "   3. Organization and account names are correct"

      - name: Find affected topics
        id: find-topics
        run: |
          cd ${{ github.workspace }}
          
          # Determine base and head refs for comparison
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            if [ "${{ github.event.pull_request.merged }}" == "true" ]; then
              # PR was merged, compare base before merge to base after merge
              BASE_REF="${{ github.event.pull_request.base.sha }}"
              HEAD_REF="${{ github.event.pull_request.merge_commit_sha }}"
            else
              # PR is open/updated, compare base to PR head
              BASE_REF="${{ github.event.pull_request.base.sha }}"
              HEAD_REF="${{ github.event.pull_request.head.sha }}"
            fi
          elif [ "${{ github.event_name }}" == "push" ]; then
            # Push event - compare previous commit to current
            BASE_REF="${{ github.event.before }}"
            HEAD_REF="${{ github.event.after }}"
            # Handle case where before is empty (first commit)
            if [ -z "$BASE_REF" ] || [ "$BASE_REF" == "0000000000000000000000000000000000000000" ]; then
              BASE_REF="HEAD~1"
            fi
          else
            # Manual trigger - use current HEAD
            BASE_REF="HEAD~1"
            HEAD_REF="HEAD"
          fi
          
          echo "Comparing $BASE_REF..$HEAD_REF"
          
          # Verify refs exist
          if ! git rev-parse --verify "$BASE_REF" >/dev/null 2>&1; then
            echo "Warning: Base ref $BASE_REF not found, using HEAD~1"
            BASE_REF="HEAD~1"
          fi
          if ! git rev-parse --verify "$HEAD_REF" >/dev/null 2>&1; then
            echo "Warning: Head ref $HEAD_REF not found, using HEAD"
            HEAD_REF="HEAD"
          fi
          
          # Find affected topics
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.topic }}" ]; then
            # Manual trigger with specific topic
            TOPICS="${{ github.event.inputs.topic }}"
            echo "topics=$TOPICS" >> $GITHUB_OUTPUT
            echo "has_topics=true" >> $GITHUB_OUTPUT
            echo "Using manually specified topic: $TOPICS"
          else
            # Auto-detect affected topics
            TOPICS=$(python .github/scripts/find_affected_topics.py \
              --base-ref "$BASE_REF" \
              --head-ref "$HEAD_REF" \
              --project-root omni \
              --output-format newline 2>&1) || true
            
            # Filter out error messages and empty lines
            TOPICS=$(echo "$TOPICS" | grep -v "^Warning:" | grep -v "^Error:" | grep -v "^$" || true)
            
            if [ -z "$TOPICS" ] || [ -z "$(echo "$TOPICS" | tr -d '\n' | tr -d ' ')" ]; then
              echo "has_topics=false" >> $GITHUB_OUTPUT
              echo "No affected topics found"
            else
              echo "topics<<EOF" >> $GITHUB_OUTPUT
              echo "$TOPICS" >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
              echo "has_topics=true" >> $GITHUB_OUTPUT
              echo "Affected topics:"
              echo "$TOPICS"
            fi
          fi

      - name: Generate Terraform resources
        id: generate
        if: steps.find-topics.outputs.has_topics == 'true'
        run: |
          cd ${{ github.workspace }}
          
          TOPICS="${{ steps.find-topics.outputs.topics }}"
          
          if [ -z "$TOPICS" ]; then
            echo "No topics to generate"
            exit 0
          fi
          
          # Generate for each affected topic
          echo "$TOPICS" | while read -r topic; do
            if [ -n "$topic" ]; then
              echo "Generating semantic view for topic: $topic"
              python generate_semantic_views.py "$topic" --output-dir terraform --project-root omni || {
                echo "Warning: Failed to generate for topic $topic"
              }
            fi
          done
          
          # List generated files
          echo "Generated Terraform files:"
          find terraform -name "*.tf" -type f | head -20 || echo "No .tf files generated"

      - name: Check for changes
        id: changes
        if: steps.find-topics.outputs.has_topics == 'true'
        run: |
          if [ -n "$(git status --porcelain terraform/ 2>/dev/null)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected in terraform files"
            git status terraform/ || true
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected in terraform files"
          fi

      - name: Terraform Init
        if: steps.changes.outputs.has_changes == 'true'
        working-directory: terraform
        run: |
          terraform init

      - name: Test Snowflake Connection
        if: steps.changes.outputs.has_changes == 'true'
        working-directory: terraform
        run: |
          echo "Testing Snowflake connection..."
          echo ""
          echo "Configuration:"
          echo "  Organization: ${{ secrets.SNOWFLAKE_ORGANIZATION_NAME }}"
          echo "  Account: ${{ secrets.SNOWFLAKE_ACCOUNT_NAME }}"
          echo "  User: ${{ secrets.SNOWFLAKE_USER }}"
          echo "  Warehouse: ${{ secrets.SNOWFLAKE_WAREHOUSE }}"
          echo "  Database: ${{ secrets.SNOWFLAKE_DATABASE }}"
          echo "  Role: ${{ secrets.SNOWFLAKE_ROLE }}"
          echo "  PAT Token: $([ -n "${{ secrets.SNOWFLAKE_OAUTH_ACCESS_TOKEN }}" ] && echo "***SET***" || echo "***MISSING***")"
          echo ""
          
          # Test connection by trying to get provider schema
          # This actually requires connecting to Snowflake
          echo "Testing provider connection..."
          if terraform providers schema -json > /dev/null 2>&1; then
            echo "✅ Snowflake connection test passed (provider schema retrieved)"
          else
            # If schema fails, try a dry-run plan which definitely requires connection
            echo "Schema test inconclusive, trying plan dry-run..."
            if terraform plan -refresh=false -out=/dev/null 2>&1 | head -20; then
              echo "✅ Snowflake connection test passed (plan dry-run succeeded)"
            else
              PLAN_EXIT=$?
              echo ""
              echo "❌ Snowflake connection test failed (exit code: $PLAN_EXIT)"
              echo ""
              echo "Common causes for HTTP 404 authentication errors:"
              echo "  1. Network Policy: GitHub Actions IPs may be blocked"
              echo "     → Check Snowflake → Admin → Network Policies"
              echo "     → Add GitHub Actions IP ranges: https://api.github.com/meta"
              echo "     → Or temporarily allow all IPs (0.0.0.0/0) for testing"
              echo ""
              echo "  2. Invalid or Expired PAT Token"
              echo "     → Check Snowflake → User Profile → Personal Access Tokens"
              echo "     → Ensure token is active and not expired"
              echo "     → Regenerate if needed"
              echo ""
              echo "  3. Incorrect Account/Organization Names"
              echo "     → Verify organization_name matches your Snowflake org"
              echo "     → Verify account_name is correct (without region suffix)"
              echo "     → Format: organization_name = 'A1234567890123'"
              echo "     → Format: account_name = 'ACCOUNTNAME' (not 'ACCOUNTNAME.region')"
              echo ""
              echo "  4. User/Role Permissions"
              echo "     → Ensure user has correct role assigned"
              echo "     → Role must have CREATE SEMANTIC VIEW permissions"
              echo ""
              echo "  5. Warehouse Not Available"
              echo "     → Ensure warehouse exists and is not suspended"
              echo "     → User must have USAGE privilege on warehouse"
              echo ""
              echo "  6. Intermittent Connection Issues"
              echo "     → Connection test may pass but plan/apply may fail"
              echo "     → This can happen with network policies or rate limiting"
              echo "     → Try running the workflow again"
              echo ""
              exit $PLAN_EXIT
            fi
          fi

      - name: Terraform Plan
        if: steps.changes.outputs.has_changes == 'true'
        working-directory: terraform
        id: plan
        run: |
          # Capture current runner IP for network policy errors
          RUNNER_IP=$(curl -s https://api.ipify.org || echo "unknown")
          echo "GitHub Actions runner IP: $RUNNER_IP"
          echo ""
          
          if terraform plan -out=tfplan 2>&1 | tee /tmp/plan_output.txt; then
            echo "plan_success=true" >> $GITHUB_OUTPUT
            echo "Plan generated successfully"
          else
            PLAN_EXIT_CODE=$?
            echo "plan_success=false" >> $GITHUB_OUTPUT
            echo "Plan failed with exit code: $PLAN_EXIT_CODE"
            
            # Check for network policy error
            if grep -q "is not allowed to access Snowflake" /tmp/plan_output.txt 2>/dev/null; then
              echo ""
              echo "🚫 NETWORK POLICY ERROR DETECTED"
              echo ""
              echo "The GitHub Actions runner IP ($RUNNER_IP) is blocked by Snowflake network policy."
              echo ""
              echo "To fix this:"
              echo "1. Go to Snowflake → Admin → Network Policies"
              echo "2. Edit your network policy (or create one if none exists)"
              echo "3. Add GitHub Actions IP ranges:"
              echo ""
              echo "   Option A: Allow all GitHub Actions IPs (recommended)"
              echo "   - Fetch IP ranges: curl https://api.github.com/meta | jq '.actions[]'"
              echo "   - Add all IP ranges from the 'actions' array to your network policy"
              echo ""
              echo "   Option B: Allow all IPs temporarily (for testing only)"
              echo "   - Add: 0.0.0.0/0 (NOT recommended for production)"
              echo ""
              echo "   Option C: Allow specific runner IP"
              echo "   - Add: $RUNNER_IP/32"
              echo "   - Note: This will only work for this specific runner"
              echo ""
              echo "4. Save the network policy"
              echo "5. Wait a few minutes for changes to propagate"
              echo "6. Re-run this workflow"
              echo ""
            fi
            
            echo "Will skip plan file on apply"
            # Remove incomplete plan file if it exists
            rm -f tfplan
            exit 0  # Don't fail the step, continue-on-error handles this
          fi
        continue-on-error: true

      - name: Terraform Apply
        if: steps.changes.outputs.has_changes == 'true' && github.event.pull_request.merged == true
        working-directory: terraform
        run: |
          PLAN_SUCCESS="${{ steps.plan.outputs.plan_success }}"
          echo "Plan success status: $PLAN_SUCCESS"
          
          # Capture current runner IP for network policy errors
          RUNNER_IP=$(curl -s https://api.ipify.org || echo "unknown")
          
          if [ -f tfplan ] && [ "$PLAN_SUCCESS" = "true" ]; then
            echo "Applying saved plan file..."
            if terraform apply -auto-approve tfplan 2>&1 | tee /tmp/apply_output.txt; then
              echo "✅ Apply succeeded"
            else
              APPLY_EXIT=$?
              # Check for network policy error
              if grep -q "is not allowed to access Snowflake" /tmp/apply_output.txt 2>/dev/null; then
                echo ""
                echo "🚫 NETWORK POLICY ERROR DETECTED"
                echo ""
                echo "The GitHub Actions runner IP ($RUNNER_IP) is blocked by Snowflake network policy."
                echo ""
                echo "To fix this:"
                echo "1. Go to Snowflake → Admin → Network Policies"
                echo "2. Edit your network policy and add GitHub Actions IP ranges"
                echo "3. See: https://api.github.com/meta for GitHub's IP ranges"
                echo "4. Re-run this workflow after updating the network policy"
                echo ""
              fi
              exit $APPLY_EXIT
            fi
          else
            echo "No valid plan file available (file exists: $([ -f tfplan ] && echo 'yes' || echo 'no'), plan_success: $PLAN_SUCCESS)"
            echo "Running direct apply..."
            if terraform apply -auto-approve 2>&1 | tee /tmp/apply_output.txt; then
              echo "✅ Apply succeeded"
            else
              APPLY_EXIT=$?
              # Check for network policy error
              if grep -q "is not allowed to access Snowflake" /tmp/apply_output.txt 2>/dev/null; then
                echo ""
                echo "🚫 NETWORK POLICY ERROR DETECTED"
                echo ""
                echo "The GitHub Actions runner IP ($RUNNER_IP) is blocked by Snowflake network policy."
                echo ""
                echo "To fix this:"
                echo "1. Go to Snowflake → Admin → Network Policies"
                echo "2. Edit your network policy and add GitHub Actions IP ranges"
                echo "3. See: https://api.github.com/meta for GitHub's IP ranges"
                echo "4. Re-run this workflow after updating the network policy"
                echo ""
              fi
              exit $APPLY_EXIT
            fi
          fi
        env:
          TF_LOG: INFO

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true' && github.event.pull_request.merged == true
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          BRANCH="${{ github.event.pull_request.base.ref }}"
          git checkout $BRANCH
          git add terraform/*.tf
          git commit -m "chore: auto-generate semantic views from Omni topics [skip ci]" || exit 0
          git push origin $BRANCH

      - name: Create summary
        if: always()
        run: |
          echo "## Semantic View Generation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.find-topics.outputs.has_topics }}" != "true" ]; then
            echo "ℹ️ No affected topics found - no semantic views to generate" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "This usually means:" >> $GITHUB_STEP_SUMMARY
            echo "- No topic/view files were changed" >> $GITHUB_STEP_SUMMARY
            echo "- Changed files don't affect any topics" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.changes.outputs.has_changes }}" == "true" ]; then
            echo "✅ Terraform resources generated successfully" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Affected Topics:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.find-topics.outputs.topics }}" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Generated Files:" >> $GITHUB_STEP_SUMMARY
            find terraform -name "*.tf" -type f 2>/dev/null | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY || echo "- No .tf files found" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No changes detected in generated Terraform files" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Affected topics were analyzed, but generated files match existing ones." >> $GITHUB_STEP_SUMMARY
          fi

