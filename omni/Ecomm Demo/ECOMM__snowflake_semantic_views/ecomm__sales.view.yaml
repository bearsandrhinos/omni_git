# Reference this view as ecomm__sales
schema: ECOMM
folder: ECOMM/snowflake_semantic_views
semantic_view_name: SALES

dimensions:
  created_at:
    sql: '"CREATED_AT"'

  product_brand:
    sql: '"PRODUCT_BRAND"'

  product_category:
    sql: '"PRODUCT_CATEGORY"'

  product_department:
    sql: '"PRODUCT_DEPARTMENT"'

  product_name:
    sql: '"PRODUCT_NAME"'

  product_sku:
    sql: '"PRODUCT_SKU"'

  sold_at:
    sql: '"SOLD_AT"'

  cost:
    sql: '"COST"'

  id:
    sql: '"ID"'

  product_distribution_center_id:
    sql: '"PRODUCT_DISTRIBUTION_CENTER_ID"'

  product_id:
    sql: '"PRODUCT_ID"'

  product_retail_price:
    sql: '"PRODUCT_RETAIL_PRICE"'

  delivered_at:
    sql: '"DELIVERED_AT"'

  is_delivered:
    sql: '"IS_DELIVERED"'

  is_returned:
    sql: '"IS_RETURNED"'

  is_shipped:
    sql: '"IS_SHIPPED"'

  returned_at:
    sql: '"RETURNED_AT"'

  shipped_at:
    sql: '"SHIPPED_AT"'

  status:
    sql: '"STATUS"'
    description: The current status of the order item, such as "Shipped", "Pending",
      "Cancelled", or "Delivered", indicating the progress of the item through
      the order fulfillment process.
    synonyms:
      [
        category,
        classification,
        condition,
        designation,
        label,
        position,
        situation,
        standing,
        state,
        tag
      ]

  inventory_item_id:
    sql: '"INVENTORY_ITEM_ID"'

  margin:
    sql: '"MARGIN"'
    description: The difference between the selling price and the cost of an item,
      representing the profit made on the sale of each item.
    synonyms: [ earnings, gain, gross_profit, markup, net_profit, profit, surplus ]

  months_since_signup:
    sql: '"MONTHS_SINCE_SIGNUP"'
    description: The number of months that have elapsed since the customer signed up
      for the service.
    synonyms:
      [
        months_as_customer,
        months_since_account_creation,
        months_since_registration,
        subscription_length_in_months,
        tenure_in_months
      ]

  order_id:
    sql: '"ORDER_ID"'

  sale_price:
    sql: '"SALE_PRICE"'
    description: The price at which the item was sold, represeenting the amount the
      customer paid for the item.
    synonyms:
      [
        amount,
        cost,
        list_price,
        price_paid,
        purchase_price,
        selling_cost,
        selling_price,
        transaction_amount,
        unit_price
      ]

  time_to_ship:
    sql: '"TIME_TO_SHIP"'
    description: The time it takes to ship the order item, measured in days.
    synonyms:
      [
        delivery_lead_time,
        lead_time_to_ship,
        shipment_duration,
        shipping_duration,
        shipping_time,
        time_to_delivery,
        time_to_dispatch
      ]

  user_id:
    sql: '"USER_ID"'

  brand:
    sql: '"BRAND"'

  category:
    sql: '"CATEGORY"'

  department:
    sql: '"DEPARTMENT"'

  name:
    sql: '"NAME"'

  sku:
    sql: '"SKU"'

  distribution_center_id:
    sql: '"DISTRIBUTION_CENTER_ID"'

  retail_price:
    sql: '"RETAIL_PRICE"'

  city:
    sql: '"CITY"'

  country:
    sql: '"COUNTRY"'

  email:
    sql: '"EMAIL"'

  first_name:
    sql: '"FIRST_NAME"'

  gender:
    sql: '"GENDER"'

  last_name:
    sql: '"LAST_NAME"'

  state:
    sql: '"STATE"'

  traffic_source:
    sql: '"TRAFFIC_SOURCE"'

  zip:
    sql: '"ZIP"'

  age:
    sql: '"AGE"'

  latitude:
    sql: '"LATITUDE"'

  longitude:
    sql: '"LONGITUDE"'

measures:
  average_cost:
    sql: '"AVERAGE_COST"'
    description: The average cost of the inventory item, representing the average
      price paid for the item over a certain period of time, often used for
      inventory valuation and cost of goods sold calculations.
    aggregate_type: semantic_view_agg
    synonyms:
      [
        average_expenditure,
        average_price,
        average_spend,
        cost_average,
        mean_cost,
        mean_expenditure,
        standard_cost,
        typical_cost
      ]

  total_cost:
    sql: '"TOTAL_COST"'
    description: The total cost of the product, including all expenses, overheads,
      and profit margins, representing the final amount that the company pays or
      charges for the product.
    aggregate_type: semantic_view_agg
    synonyms:
      [
        overall_cost,
        total_expenditure,
        total_expense,
        total_outlay,
        total_spend
      ]

  average_sale_price:
    sql: '"AVERAGE_SALE_PRICE"'
    aggregate_type: semantic_view_agg

  max_sales:
    sql: '"MAX_SALES"'
    description: The maximum number of sales for an order item.
    aggregate_type: semantic_view_agg
    synonyms:
      [
        highest_revenue,
        highest_sales,
        max_revenue,
        maximum_revenue,
        peak_sales,
        sales_ceiling,
        sales_maximum,
        top_sales
      ]

  total_revenue:
    sql: '"TOTAL_REVENUE"'
    description: The total revenue generated by each order item, representing the
      product of the item's unit price and quantity sold.
    aggregate_type: semantic_view_agg
    synonyms:
      [
        gross_revenue,
        overall_revenue,
        total_income,
        total_sales,
        total_turnover
      ]

  profit:
    sql: '"PROFIT"'
    aggregate_type: semantic_view_agg

  user_id_count_distinct:
    sql: ${ecomm__sales.user_id}
    aggregate_type: count_distinct
