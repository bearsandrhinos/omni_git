# Reference this view as demo__opportunity_line_item
schema: DEMO
table_name: OPPORTUNITY_LINE_ITEM

dimensions:
  id:
    sql: '"ID"'
    format: ID
    primary_key: true

  opportunity_id:
    sql: '"OPPORTUNITY_ID"'
    format: ID

  product_id:
    sql: '"PRODUCT_ID"'
    format: ID

  created_date:
    sql: '"CREATED_DATE"'

  quantity:
    sql: '"QUANTITY"'

  unit_price:
    sql: '"UNIT_PRICE"'

measures:
  count:
    aggregate_type: count
