# Reference this view as demo__contacts
schema: DEMO
table_name: CONTACTS

dimensions:
  id:
    sql: '"ID"'
    format: ID
    primary_key: true

  account_id:
    sql: '"ACCOUNT_ID"'
    format: ID

  first_name:
    sql: '"FIRST_NAME"'

  last_name:
    sql: '"LAST_NAME"'

  email:
    sql: '"EMAIL"'

  phone:
    sql: '"PHONE"'

  title:
    sql: '"TITLE"'

  created_date:
    sql: '"CREATED_DATE"'

measures:
  count:
    aggregate_type: count
