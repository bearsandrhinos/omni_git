# Reference this view as order_items
schema: PUBLIC
table_name: ORDER_ITEMS

dimensions:
  id:
    sql: '"ID"'
    format: ID
    primary_key: true

  order_id:
    sql: '"ORDER_ID"'
    format: ID

  user_id:
    sql: '"USER_ID"'
    format: ID

  inventory_item_id:
    sql: '"INVENTORY_ITEM_ID"'
    format: ID

  sale_price:
    sql: '"SALE_PRICE"'

  status:
    sql: '"STATUS"'

  created_at:
    sql: '"CREATED_AT"'

  returned_at:
    sql: '"RETURNED_AT"'

  shipped_at:
    sql: '"SHIPPED_AT"'

  delivered_at:
    sql: '"DELIVERED_AT"'

measures:
  count:
    aggregate_type: count

  sale_price_sum:
    sql: ${order_items.sale_price}
    label: Total Revenue
    format: USDCURRENCY_2
    aggregate_type: sum
