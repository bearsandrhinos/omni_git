# Reference this view as users
schema: PUBLIC
table_name: USERS

dimensions:
  id:
    sql: '"ID"'
    format: ID
    primary_key: true

  first_name:
    sql: '"FIRST_NAME"'

  last_name:
    sql: '"LAST_NAME"'

  email:
    sql: '"EMAIL"'

  age:
    sql: '"AGE"'

  city:
    sql: '"CITY"'

  state:
    sql: '"STATE"'

  country:
    sql: '"COUNTRY"'

  zip:
    sql: '"ZIP"'

  latitude:
    sql: '"LATITUDE"'

  longitude:
    sql: '"LONGITUDE"'

  gender:
    sql: '"GENDER"'

  created_at:
    sql: '"CREATED_AT"'

  traffic_source:
    sql: '"TRAFFIC_SOURCE"'

  extract_domain_from_email:
    sql: RIGHT(${users.email}, LENGTH(${users.email}) - CASE WHEN POSITION('@',
      SUBSTRING(${users.email}, 1, LENGTH(${users.email}))) > 0 THEN
      POSITION('@', SUBSTRING(${users.email}, 1, LENGTH(${users.email}))) + (1 -
      1) ELSE NULL END)
    label: Email Domain

measures:
  count:
    aggregate_type: count

  age_average:
    sql: ${users.age}
    aggregate_type: average
