# Reference this view as templated_filter
schema: PUBLIC
sql: |
  SELECT 
    user_id,
    COUNT(*) AS total_items
  FROM order_items
  WHERE 
    {{# templated_filter.order_date.filter }} order_items.created_at {{/ templated_filter.order_date.filter }}
    AND {{# templated_filter.order_date.filter }} order_items.status {{/ templated_filter.order_date.filter }}
  GROUP BY 1

dimensions:
  user_id:
    sql: '"USER_ID"'

  total_items:
    sql: '"TOTAL_ITEMS"'

measures:
  count:
    aggregate_type: count

filters:
  order_date:
    type: timestamp

  status:
    type: string
    suggest_from_field: order_items.status
